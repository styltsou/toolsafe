version: 1
advisory: true
note: This policy is an advisory draft generated from static OpenAPI analysis.
  It is not enforced unless a runtime guard, proxy, or generated server
  implements it.
source:
  filePath: examples/risky-openapi.yaml
  title: Risky Example API
  version: 1.0.0
defaults:
  mode: allow
operations:
  sendEmail:
    operationId: sendEmail
    method: POST
    path: /emails/send
    risk: high
    mode: require_confirmation
    reasons:
      - HTTP method POST can mutate state
      - 'Risk keyword: email'
      - External communication operation does not declare a confirmation or
        guard signal.
      - Mutating operation does not expose dry-run, preview, or validate-only
        mode.
    recommendedControls:
      - Require explicit user confirmation before execution.
      - Normalize unstructured API errors before returning them to agents.
      - Require recipient review before external communication is sent.
      - Prefer dry-run, preview, or validate-only mode before mutation.
  chargePayment:
    operationId: chargePayment
    method: POST
    path: /payments/charge
    risk: high
    mode: require_confirmation
    reasons:
      - HTTP method POST can mutate state
      - 'Risk keyword: payment'
      - Financial mutating operation does not expose an idempotency key.
      - Mutating operation does not expose dry-run, preview, or validate-only
        mode.
    recommendedControls:
      - Require explicit user confirmation before execution.
      - Normalize unstructured API errors before returning them to agents.
      - Require idempotency keys for financial mutations.
      - Prefer dry-run, preview, or validate-only mode before mutation.
  listUsers:
    operationId: listUsers
    method: GET
    path: /users
    risk: low
    mode: allow
    reasons:
      - HTTP method GET is generally read-only
    recommendedControls:
      - Normalize unstructured API errors before returning them to agents.
      - Apply a default result limit when the caller does not provide one.
  createUser:
    operationId: createUser
    method: POST
    path: /users
    risk: medium
    mode: require_review
    reasons:
      - HTTP method POST can mutate state
      - Mutating operation does not expose dry-run, preview, or validate-only
        mode.
    recommendedControls:
      - Normalize unstructured API errors before returning them to agents.
      - Prefer dry-run, preview, or validate-only mode before mutation.
      - Validate constrained string inputs against an allowed set.
      - Require explicit review for ambiguous boolean inputs.
  deleteUser:
    operationId: deleteUser
    method: DELETE
    path: /users/{id}
    risk: high
    mode: require_confirmation
    reasons:
      - HTTP method DELETE is destructive
      - Destructive operation does not declare an explicit agent guard or
        confirmation signal in the API contract.
      - Mutating operation does not expose dry-run, preview, or validate-only
        mode.
    recommendedControls:
      - Require explicit user confirmation before execution.
      - Require confirmation or guard metadata for destructive execution.
      - Normalize unstructured API errors before returning them to agents.
      - Prefer dry-run, preview, or validate-only mode before mutation.
