    input:
      confirmation: false
      placeholders:
        pathParams: fill required path parameters
    expectedBehavior: The runtime should block execution or require explicit
      confirmation before the destructive operation is allowed.
    reason: Destructive operation does not declare an explicit agent guard or
      confirmation signal in the API contract.
